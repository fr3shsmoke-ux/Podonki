name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: Brands/Brands/Brands/Podonki/Projects/Content-automation
        run: npm ci

      - name: Run tests with coverage
        working-directory: Projects/Content-automation
        run: npm test -- --coverage

      - name: SonarQube scan
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.projectKey=fr3shsmoke-ux_Podonki
            -Dsonar.organization=fr3shsmoke-ux
            -Dsonar.projectBaseDir=Projects/Content-automation
            -Dsonar.sources=src,scripts,config
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

