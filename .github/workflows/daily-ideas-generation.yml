name: Daily Ideas Generation
on:
  schedule:
    # Каждый день в 23:00 UTC (02:00 МСК следующего дня)
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  generate_ideas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate daily content ideas
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-3-5-sonnet-20241022
        run: node scripts/idea-generator.js

      - name: Update IDEAS-BACKLOG
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions Bot"
          git add data/IDEAS-BACKLOG.json
          git commit -m "Auto-generated ideas: $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push

      - name: Notify on success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✨ Daily ideas generated!

            Date: $(date +%Y-%m-%d)
            Status: ✅ Success

            Check IDEAS-BACKLOG.json for new content ideas

            #automation #content #podonki

      - name: Notify on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ Daily ideas generation failed!

            Date: $(date +%Y-%m-%d)
            Check GitHub Actions logs for details

            #automation #error #podonki



