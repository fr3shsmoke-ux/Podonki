name: Scheduled Telegram Posting
on:
  schedule:
    # Пн, Ср, Пт в 18:00 UTC (21:00 МСК)
    - cron: '0 18 * * 1,3,5'
  workflow_dispatch:
    inputs:
      force_post_index:
        description: 'Force specific idea index (0-based)'
        required: false

jobs:
  telegram_post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-telegram-bot requests

      - name: Load and validate content
        id: validate
        run: |
          python -c "
          import json
          import os

          if not os.path.exists('data/IDEAS-BACKLOG.json'):
            raise FileNotFoundError('IDEAS-BACKLOG.json not found')

          with open('data/IDEAS-BACKLOG.json') as f:
            ideas = json.load(f)

          if not ideas:
            raise ValueError('No ideas in backlog')

          # Get best idea (by score or first one)
          best_idea = max(ideas, key=lambda x: x.get('quality_score', 0))

          print(f'ideas_count={len(ideas)}')
          print(f'best_idea_title={best_idea[\"title\"]}')
          " | tee posting_stats.txt

      - name: Format and send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_INDEX: ${{ github.event.inputs.force_post_index || '-1' }}
        run: |
          python << 'EOF'
          import os
          import json
          import asyncio
          from telegram import Bot
          import logging

          logging.basicConfig(level=logging.INFO)
          logger = logging.getLogger(__name__)

          async def post_to_telegram():
              bot = Bot(token=os.getenv('TELEGRAM_BOT_TOKEN'))
              channel_id = os.getenv('TELEGRAM_CHANNEL_ID')

              # Load ideas
              with open('data/IDEAS-BACKLOG.json') as f:
                  ideas = json.load(f)

              if not ideas:
                  logger.error("No ideas available")
                  return False

              # Select idea
              force_index = int(os.getenv('FORCE_INDEX', -1))
              if force_index >= 0 and force_index < len(ideas):
                  selected_idea = ideas[force_index]
              else:
                  # Select by highest quality_score
                  selected_idea = max(ideas, key=lambda x: x.get('quality_score', 0))

              # Format message
              message = f"""🔥 *{selected_idea.get('title', 'No title')}*

{selected_idea.get('description', 'No description')}

*Тип:* {selected_idea.get('type', 'content')}
*Платформа:* {selected_idea.get('platform', 'mixed')}

#{' #'.join(selected_idea.get('tags', []))}

_Generated by AI • Podonki automation_"""

              try:
                  # Send message
                  await bot.send_message(
                      chat_id=channel_id,
                      text=message,
                      parse_mode='Markdown'
                  )
                  logger.info(f"✅ Posted: {selected_idea.get('title')}")

                  # Mark as posted
                  selected_idea['posted'] = True
                  selected_idea['posted_at'] = asyncio.get_event_loop().time()

                  # Save updated backlog
                  with open('data/IDEAS-BACKLOG.json', 'w') as f:
                      json.dump(ideas, f, indent=2, ensure_ascii=False)

                  return True

              except Exception as e:
                  logger.error(f"❌ Failed to post: {e}")
                  return False

          success = asyncio.run(post_to_telegram())
          exit(0 if success else 1)
          EOF

      - name: Commit changes
        if: success()
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions Bot"
          git add data/IDEAS-BACKLOG.json
          git commit -m "Post published: $(date +%Y-%m-%d)" || echo "No changes"
          git push

      - name: Notify success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Post published successfully!

            Time: $(date +%H:%M:%S\ %Z)
            Status: Live 🔴

            #posted #automation #podonki

      - name: Notify failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ Failed to publish post

            Check: https://github.com/${{ github.repository }}/actions

            #error #urgent

      - name: Archive logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: posting-logs
          path: posting_stats.txt
          retention-days: 7

